server:
  port: 8080

spring:
  application:
    name: lux-booking-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lux_booking}
    username: ${DB_USERNAME:lux}
    password: ${DB_PASSWORD:lux_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

lux:
  jwt:
    secret: ${JWT_SECRET:LuxBookingSecretKeyWithAtLeast32Characters2026!}
    access-token-expiration-minutes: ${JWT_ACCESS_MINUTES:30}
    refresh-token-expiration-days: ${JWT_REFRESH_DAYS:7}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  invoice:
    storage-dir: ${INVOICE_STORAGE_DIR:./invoices}
  company:
    logo-path: ${COMPANY_LOGO_PATH:./logo.png}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@partycentrumlux.nl}
    owner-email: ${OWNER_EMAIL:owner@partycentrumlux.nl}
